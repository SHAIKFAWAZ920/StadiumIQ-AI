name: StadiumIQ AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test and Build Verification
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # 3. Run Backend Test Suite
      - name: Run Pytest Suite
        run: |
          python -m pytest backend/tests/

      # 4. Setup Node environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      # 5. Verify Frontend Production Build
      - name: Compile Frontend Build
        run: |
          cd frontend
          npm run build

  deploy:
    name: Cloud Deployment
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # A. Authenticate with Google Cloud
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # B. Run Google Cloud Build deployment
      - name: Trigger Cloud Run Deploy
        run: |
          gcloud builds submit --config=deployment/cloudbuild.yaml .

      # C. Retrieve Backend URL & Deploy to Firebase Hosting
      - name: Get Backend URL
        id: run-url
        run: |
          URL=$(gcloud run services describe stadium-iq-backend --region=us-central1 --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Deploy Frontend to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STADIUM_IQ_AI }}
          projectId: stadium-iq-ai
          channelId: live
        env:
          VITE_API_BASE_URL: ${{ steps.run-url.outputs.url }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET_KEY=stadium_iq_fifa_2026_secret_key_super_secure
      - DATABASE_URL=sqlite:///./stadium_iq.db
    volumes:
      - backend_data:/app
    restart: always

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
